<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="stylesheet" href="style.css">
  <script src="main.js" defer></script>
  <title>TypeTrainer</title>
</head>
<body>
  <!-- Header -->
  <header class="header">
    <button type="button" class="button button--primary open-popup-button">Add text</button>
  </header>

  <!-- Main -->
  <main class="content">

    <!-- Input section -->
    <section class="typing-input-section">
      <input
        type="text"
        id="typing-input"
        class="typing-input"
        placeholder="Start typing..."
        aria-label="Typing input"
        autocomplete="off"
      />
    </section>

    <!-- Text section -->
    <section class="typing-text-section">
      <div class="typing-text">Some text to type</div>
    </section>

    <!-- Keyboard section -->
    <section class="keyboard-section">
      <div class="keyboard">
        <div class="keys-line">
          <div class="key key--smal">`</div>
          <div class="key key--smal">1</div>
          <div class="key key--smal">2</div>
          <div class="key key--smal">3</div>
          <div class="key key--smal">4</div>
          <div class="key key--smal">5</div>
          <div class="key key--smal">6</div>
          <div class="key key--smal">7</div>
          <div class="key key--smal">8</div>
          <div class="key key--smal">9</div>
          <div class="key key--smal">0</div>
          <div class="key key--smal">-</div>
          <div class="key key--smal">=</div>
          <div class="key key--smal key--wide">delete</div>
        </div>
        <div class="keys-line">
          <div class="key key--wide">tab</div>
          <div class="key">q</div>
          <div class="key">w</div>
          <div class="key">e</div>
          <div class="key">r</div>
          <div class="key">t</div>
          <div class="key">y</div>
          <div class="key">u</div>
          <div class="key">i</div>
          <div class="key">o</div>
          <div class="key">p</div>
          <div class="key">[</div>
          <div class="key">]</div>
          <div class="key">\</div>
        </div>
        <div class="keys-line">
          <div class="key key--medium-wide">caps lock</div>
          <div class="key">a</div>
          <div class="key">s</div>
          <div class="key">d</div>
          <div class="key">f</div>
          <div class="key">g</div>
          <div class="key">h</div>
          <div class="key">j</div>
          <div class="key">k</div>
          <div class="key">l</div>
          <div class="key">;</div>
          <div class="key">'</div>
          <div class="key key--medium-wide">return</div>
        </div>
        <div class="keys-line">
          <div class="key key--extra-wide">shift</div>
          <div class="key">z</div>
          <div class="key">x</div>
          <div class="key">c</div>
          <div class="key">v</div>
          <div class="key">b</div>
          <div class="key">n</div>
          <div class="key">m</div>
          <div class="key">,</div>
          <div class="key">.</div>
          <div class="key">/</div>
          <div class="key key--extra-wide">shift</div>
        </div>
        <div class="keys-line keys-line--space">
          <div class="key key--space">space</div>
        </div>
      </div>
    </section>
  </main>
</body>
</html>
