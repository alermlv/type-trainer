<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="stylesheet" href="style.css">
  <script src="main.js" defer></script>
  <title>TypeTrainer</title>
</head>
<body>
  <header class="header">
    <button type="button" class="button button--primary open-popup-button">Add text</button>
  </header>
  <main class="content">
    <section class="typing-input-section">
      <input
        type="text"
        id="typing-input"
        class="typing-input"
        placeholder="Start typing..."
        aria-label="Typing input"
        autocomplete="off"
      />
    </section>
    <section class="typing-text-section">
      <div class="typing-text">Some text to type</div>
    </section>
    <section class="keyboard-section">
      <div class="keyboard"></div>
    </section>
  </main>
</body>
</html>
